{% extends 'base.html' %}

{% block contenido %}

<h3 class="text-center text-md-start">Contacto</h3>

<form method="POST">
  <input class="form-control mb-3" name="nombre" placeholder="Nombre" required>
  <input class="form-control mb-3" name="email" placeholder="Email" required>
  <textarea class="form-control mb-3" name="mensaje" placeholder="Mensaje" required></textarea>
  <button class="btn btn-primary w-100 w-md-auto">Enviar</button>
</form>

<hr>

<button class="btn btn-success mt-3 w-100 w-md-auto" onclick="mostrarMensajes()">
    Mostrar mensajes
</button>

<div id="mensajes" style="display:none;" class="mt-3">

    <h4>Mensajes recibidos</h4>

    {% for m in mensajes %}
    <div class="card p-3 mb-2">
        <strong>{{ m[1] }}</strong> ({{ m[2] }})
        <p>{{ m[3] }}</p>
    </div>
    {% else %}
    <p>No hay mensajes aún</p>
    {% endfor %}

</div>

<script>
function mostrarMensajes() {
    var div = document.getElementById("mensajes");
    div.style.display = (div.style.display === "none") ? "block" : "none";
}
</script>

{% endblock %}
